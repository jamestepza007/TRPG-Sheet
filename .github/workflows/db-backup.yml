name: Database Backup

on:
  schedule:
    - cron: '0 2 */3 * *'  # Every 3 days at 2:00 AM UTC
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    container:
      image: postgres:18  # Match Railway PostgreSQL version

    steps:
      - name: Create backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          mkdir -p backups
          FILENAME="backups/backup_$(date +%Y-%m-%d).sql"
          pg_dump "$DATABASE_URL" > "$FILENAME"
          echo "✅ Backup saved: $FILENAME"
          ls -lh "$FILENAME"

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backups/
          retention-days: 30
